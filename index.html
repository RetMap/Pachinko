<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Pachinko - Enhanced</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        #ui {
            padding: 20px;
            text-align: center;
            background: #1a1a1a;
            width: 100%;
            border-bottom: 2px solid #333;
        }
        canvas {
            box-shadow: 0 0 30px rgba(0,255,204,0.2);
            border: 4px solid #444;
            border-radius: 0 0 10px 10px;
            cursor: crosshair;
        }
        .score-board {
            font-size: 32px;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0,255,204,0.5);
            margin-bottom: 5px;
        }
        .controls {
            font-size: 14px;
            color: #aaa;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="score-board">SCORE: <span id="scoreVal">0</span></div>
        <div class="controls">CLICK TO DROP • HIT BUMPERS FOR BIG BOUNCES</div>
    </div>

    <script>
        const config = {
            width: 600,
            height: 800,
            pinRadius: 4,
            ballRadius: 7,
            bumperRadius: 25,
            rows: 9,
            cols: 11,
            buckets: [
                { score: 10, color: '#ff4d4d' },
                { score: 50, color: '#ff9900' },
                { score: 250, color: '#00ffcc' },
                { score: 50, color: '#ff9900' },
                { score: 10, color: '#ff4d4d' }
            ]
        };

        let score = 0;
        const scoreEl = document.getElementById('scoreVal');
        const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;

        const engine = Engine.create();
        const world = engine.world;
        const render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: config.width,
                height: config.height,
                wireframes: false,
                background: '#0f0f0f'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // --- Boundaries ---
        const walls = [
            Bodies.rectangle(config.width/2, 0, config.width, 20, { isStatic: true, render: { fillStyle: '#222' } }),
            Bodies.rectangle(0, config.height/2, 20, config.height, { isStatic: true, render: { fillStyle: '#222' } }),
            Bodies.rectangle(config.width, config.height/2, 20, config.height, { isStatic: true, render: { fillStyle: '#222' } }),
        ];
        Composite.add(world, walls);

        // --- Large Bumpers (New Obstacles) ---
        // These have a high restitution (bounciness) to propel the ball
        const bumpers = [
            { x: 150, y: 350 }, { x: 450, y: 350 },
            { x: 300, y: 500 },
            { x: 100, y: 600 }, { x: 500, y: 600 }
        ].map(pos => {
            return Bodies.circle(pos.x, pos.y, config.bumperRadius, {
                isStatic: true,
                restitution: 1.5,
                label: 'pin', // Reuse flash logic
                render: { 
                    fillStyle: '#333',
                    strokeStyle: '#00ffcc',
                    lineWidth: 3
                }
            });
        });
        Composite.add(world, bumpers);

        // --- Standard Pins ---
        const spacingX = config.width / config.cols;
        const spacingY = 60;
        for (let r = 0; r < config.rows; r++) {
            for (let c = 0; c < config.cols; c++) {
                let x = c * spacingX + spacingX / 2;
                if (r % 2 === 1) x += spacingX / 2;
                
                // Avoid overlapping with the new large bumpers
                const isOverlapping = bumpers.some(b => Math.hypot(b.position.x - x, b.position.y - (150 + r * spacingY)) < 50);

                if (x < config.width - 30 && x > 30 && !isOverlapping) {
                    const pin = Bodies.circle(x, 150 + (r * spacingY), config.pinRadius, {
                        isStatic: true,
                        restitution: 0.8,
                        label: 'pin',
                        render: { fillStyle: '#444' }
                    });
                    Composite.add(world, pin);
                }
            }
        }

        // --- Buckets & Labels ---
        const bucketWidth = config.width / config.buckets.length;
        const bucketBodies = [];

        config.buckets.forEach((b, i) => {
            const x = i * bucketWidth + bucketWidth / 2;
            const sensor = Bodies.rectangle(x, config.height - 15, bucketWidth - 10, 30, {
                isStatic: true,
                isSensor: true,
                label: 'bucket',
                scoreValue: b.score,
                render: { fillStyle: b.color, opacity: 0.3 }
            });
            const divider = Bodies.rectangle(x - bucketWidth/2, config.height - 50, 6, 100, { 
                isStatic: true, 
                render: { fillStyle: '#222' } 
            });
            bucketBodies.push(sensor);
            Composite.add(world, [sensor, divider]);
        });

        // --- Custom Label Rendering ---
        Events.on(render, 'afterRender', () => {
            const ctx = render.context;
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            bucketBodies.forEach(bucket => {
                ctx.fillStyle = bucket.render.fillStyle;
                ctx.globalAlpha = 0.8;
                ctx.fillText(bucket.scoreValue, bucket.position.x, bucket.position.y - 10);
            });
            ctx.globalAlpha = 1.0;
        });

        // --- Collisions ---
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach((pair) => {
                if (pair.bodyA.label === 'pin') flashPin(pair.bodyA);
                if (pair.bodyB.label === 'pin') flashPin(pair.bodyB);
                handleScoring(pair.bodyA, pair.bodyB);
            });
        });

        function flashPin(pin) {
            const originalColor = pin.circleRadius > config.pinRadius ? '#333' : '#444';
            pin.render.fillStyle = '#fff';
            setTimeout(() => pin.render.fillStyle = originalColor, 100);
        }

        function handleScoring(bodyA, bodyB) {
            const ball = bodyA.label === 'ball' ? bodyA : (bodyB.label === 'ball' ? bodyB : null);
            const bucket = bodyA.label === 'bucket' ? bodyA : (bodyB.label === 'bucket' ? bodyB : null);

            if (ball && bucket) {
                score += bucket.scoreValue;
                scoreEl.innerText = score;
                bucket.render.opacity = 1;
                setTimeout(() => bucket.render.opacity = 0.3, 200);
                Composite.remove(world, ball);
            }
        }

        window.addEventListener('mousedown', (e) => {
            const rect = render.canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            if (x > 0 && x < config.width) {
                const ball = Bodies.circle(x, 40, config.ballRadius, {
                    restitution: 0.5,
                    friction: 0.001,
                    label: 'ball',
                    render: { fillStyle: '#ffffff' }
                });
                Composite.add(world, ball);
            }
        });
    </script>
</body>
</html>
