<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Pachinko - High Score Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #ui {
            padding: 15px;
            text-align: center;
            background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
            width: 600px;
            border-bottom: 2px solid #333;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .stat-box { display: flex; flex-direction: column; }
        .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 24px; font-weight: bold; color: #00ffcc; }
        #highScoreVal { color: #ffcc00; } /* Gold color for high score */
        
        canvas { border: 4px solid #333; border-top: none; cursor: crosshair; }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 40px;
            border: 2px solid #00ffcc;
            text-align: center;
            display: none;
            z-index: 10;
            box-shadow: 0 0 50px rgba(0,255,204,0.3);
        }
        .new-record { color: #ffcc00; font-weight: bold; display: none; margin-top: 10px; }
        button {
            background: #00ffcc;
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat-box">
            <span class="label">Best</span>
            <span class="value" id="highScoreVal">0</span>
        </div>
        <div class="stat-box">
            <span class="label">Score</span>
            <span class="value" id="scoreVal">0</span>
        </div>
        <div class="stat-box">
            <span class="label">Balls</span>
            <span class="value" id="ballsLeft">10</span>
        </div>
    </div>

    <div id="gameOver">
        <h2 style="margin:0">ROUND OVER</h2>
        <p style="font-size: 1.2em">Final Score: <span id="finalScore">0</span></p>
        <div id="newRecordMsg" class="new-record">🏆 NEW PERSONAL BEST! 🏆</div>
        <button onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <script>
        const config = {
            width: 600,
            height: 800,
            pinRadius: 3,
            ballRadius: 7,
            bumperRadius: 20,
            rows: 15,
            cols: 18, 
            initialBalls: 10,
            buckets: [
                { score: 5, color: '#444' },
                { score: 20, color: '#ff4d4d' },
                { score: 50, color: '#ff9900' },
                { score: 100, color: '#00ffcc' },
                { score: 500, color: '#ffffff' }, // Jackpot
                { score: 100, color: '#00ffcc' },
                { score: 50, color: '#ff9900' },
                { score: 20, color: '#ff4d4d' },
                { score: 5, color: '#444' }
            ]
        };

        let score = 0;
        let ballsLeft = config.initialBalls;
        let activeBalls = 0;
        let highScore = localStorage.getItem('pachinko_highscore') || 0;

        // Initialize High Score UI
        document.getElementById('highScoreVal').innerText = highScore;

        const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
        const engine = Engine.create();
        const world = engine.world;
        const render = Render.create({
            element: document.body,
            engine: engine,
            options: { width: config.width, height: config.height, wireframes: false, background: '#0a0a0a' }
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);

        // Environment setup (Walls & Bumpers)
        Composite.add(world, [
            Bodies.rectangle(config.width/2, 0, config.width, 20, { isStatic: true, render: { fillStyle: '#222' } }),
            Bodies.rectangle(0, config.height/2, 20, config.height, { isStatic: true, render: { fillStyle: '#222' } }),
            Bodies.rectangle(config.width, config.height/2, 20, config.height, { isStatic: true, render: { fillStyle: '#222' } })
        ]);

        const bumpers = [
            { x: 100, y: 250 }, { x: 500, y: 250 },
            { x: 300, y: 400 },
            { x: 180, y: 550 }, { x: 420, y: 550 }
        ].map(pos => Bodies.circle(pos.x, pos.y, config.bumperRadius, {
            isStatic: true, restitution: 1.7, label: 'pin',
            render: { fillStyle: '#111', strokeStyle: '#ffcc00', lineWidth: 3 }
        }));
        Composite.add(world, bumpers);

        // Dense Pin Layout
        const spacingX = config.width / config.cols;
        const spacingY = 40;
        for (let r = 0; r < config.rows; r++) {
            for (let c = 0; c < config.cols; c++) {
                let x = c * spacingX + spacingX / 2;
                if (r % 2 === 1) x += spacingX / 2;
                const overlap = bumpers.some(b => Math.hypot(b.position.x - x, b.position.y - (120 + r * spacingY)) < 45);
                if (x > 30 && x < config.width - 30 && !overlap) {
                    Composite.add(world, Bodies.circle(x, 120 + (r * spacingY), config.pinRadius, {
                        isStatic: true, restitution: 0.8, label: 'pin', render: { fillStyle: '#333' }
                    }));
                }
            }
        }

        // Buckets
        const bucketWidth = config.width / config.buckets.length;
        const bucketBodies = config.buckets.map((b, i) => {
            const x = i * bucketWidth + bucketWidth / 2;
            const sensor = Bodies.rectangle(x, config.height - 15, bucketWidth - 8, 30, {
                isStatic: true, isSensor: true, label: 'bucket', scoreValue: b.score,
                render: { fillStyle: b.color, opacity: 0.3 }
            });
            Composite.add(world, [
                sensor,
                Bodies.rectangle(x - bucketWidth/2, config.height - 50, 4, 100, { isStatic: true, render: { fillStyle: '#222' } })
            ]);
            return sensor;
        });

        // UI Label Rendering
        Events.on(render, 'afterRender', () => {
            const ctx = render.context;
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            bucketBodies.forEach(b => {
                ctx.fillStyle = b.render.fillStyle;
                ctx.globalAlpha = 0.9;
                ctx.fillText(b.scoreValue, b.position.x, b.position.y - 12);
            });
        });

        // Collision Logic
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach((pair) => {
                const pin = pair.bodyA.label === 'pin' ? pair.bodyA : (pair.bodyB.label === 'pin' ? pair.bodyB : null);
                if (pin) {
                    pin.render.fillStyle = '#fff';
                    setTimeout(() => pin.render.fillStyle = pin.circleRadius > config.pinRadius ? '#111' : '#333', 80);
                }

                const ball = pair.bodyA.label === 'ball' ? pair.bodyA : (pair.bodyB.label === 'ball' ? pair.bodyB : null);
                const bucket = pair.bodyA.label === 'bucket' ? pair.bodyA : (pair.bodyB.label === 'bucket' ? pair.bodyB : null);

                if (ball && bucket) {
                    score += bucket.scoreValue;
                    document.getElementById('scoreVal').innerText = score;
                    bucket.render.opacity = 1;
                    setTimeout(() => bucket.render.opacity = 0.3, 200);
                    Composite.remove(world, ball);
                    activeBalls--;
                    checkGameOver();
                }
            });
        });

        function checkGameOver() {
            if (ballsLeft === 0 && activeBalls === 0) {
                document.getElementById('gameOver').style.display = 'block';
                document.getElementById('finalScore').innerText = score;
                
                // --- High Score Logic ---
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('pachinko_highscore', highScore);
                    document.getElementById('highScoreVal').innerText = highScore;
                    document.getElementById('newRecordMsg').style.display = 'block';
                }
            }
        }

        window.addEventListener('mousedown', (e) => {
            if (ballsLeft > 0 && e.target.tagName !== 'BUTTON') {
                const rect = render.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                if (x > 20 && x < config.width - 20) {
                    const ball = Bodies.circle(x, 40, config.ballRadius, {
                        restitution: 0.5, friction: 0.001, label: 'ball', render: { fillStyle: '#fff' }
                    });
                    Composite.add(world, ball);
                    ballsLeft--;
                    activeBalls++;
                    document.getElementById('ballsLeft').innerText = ballsLeft;
                }
            }
        });
    </script>
</body>
</html>
